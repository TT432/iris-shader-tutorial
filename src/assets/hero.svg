<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="iris" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <linearGradient id="shader" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#67e8f9"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="400" fill="url(#bg)"/>

  <!-- Grid pattern -->
  <g opacity="0.03">
    <line x1="0" y1="80" x2="800" y2="80" stroke="white"/>
    <line x1="0" y1="160" x2="800" y2="160" stroke="white"/>
    <line x1="0" y1="240" x2="800" y2="240" stroke="white"/>
    <line x1="0" y1="320" x2="800" y2="320" stroke="white"/>
    <line x1="160" y1="0" x2="160" y2="400" stroke="white"/>
    <line x1="320" y1="0" x2="320" y2="400" stroke="white"/>
    <line x1="480" y1="0" x2="480" y2="400" stroke="white"/>
    <line x1="640" y1="0" x2="640" y2="400" stroke="white"/>
  </g>

  <!-- Iris logo (stylized eye/camera) -->
  <g transform="translate(400, 160)">
    <!-- Camera body -->
    <rect x="-40" y="-30" width="80" height="60" rx="10" fill="none" stroke="url(#iris)" stroke-width="3"/>
    <!-- Lens -->
    <circle cx="0" cy="0" r="20" fill="none" stroke="url(#iris)" stroke-width="3"/>
    <circle cx="0" cy="0" r="12" fill="url(#iris)" opacity="0.8"/>
    <circle cx="0" cy="0" r="5" fill="#1a1a2e"/>
    <!-- Viewfinder -->
    <rect x="-8" y="-38" width="16" height="8" rx="2" fill="none" stroke="url(#iris)" stroke-width="2"/>
  </g>

  <!-- Shader code-like decorations -->
  <g opacity="0.08" font-family="monospace" font-size="14" fill="#06b6d4">
    <text x="20" y="40">#version 330 core</text>
    <text x="20" y="60">uniform sampler2D colortex0;</text>
    <text x="20" y="80">in vec2 texcoord;</text>
    <text x="20" y="100">out vec4 fragColor;</text>

    <text x="580" y="330">void main() {</text>
    <text x="600" y="350">fragColor = texture(colortex0, texcoord);</text>
    <text x="580" y="370">}</text>
  </g>

  <!-- Title -->
  <text x="400" y="280" text-anchor="middle" font-family="sans-serif" font-size="36" font-weight="bold" fill="white">
    Iris Shader 开发教程
  </text>

  <!-- Subtitle -->
  <text x="400" y="320" text-anchor="middle" font-family="sans-serif" font-size="16" fill="#94a3b8">
    面向程序员的 Minecraft 光影开发系统教程
  </text>
</svg>
